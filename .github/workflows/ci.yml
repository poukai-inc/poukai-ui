name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm check:llms

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upload bundle stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/stats.html
          retention-days: 30
      - name: Upload dist (for size job)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  size:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - run: pnpm size

  # React 18/19 × browser matrix. Sharding by browser cuts wall time ~3x
  # vs running all three browsers serially in a single `pnpm test` invocation.
  # Each shard installs only the one browser binary it needs.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react: ["18", "19"]
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install React ${{ matrix.react }} (latest minor)
        if: matrix.react == '19'
        run: pnpm add -D react@^19 react-dom@^19 @types/react@^19 @types/react-dom@^19
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browser (${{ matrix.browser }})
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}
      - run: pnpm test --project=${{ matrix.browser }}

  secret-scan:
    name: secret-scan — gitleaks (R-048)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs the full history to scan past commits.
          fetch-depth: 0

      # The `gitleaks-action` wrapper requires a paid license for org-owned
      # repos. The `gitleaks` CLI itself (MIT-licensed) is free and identical
      # in detection behavior — we invoke it directly via the GitHub release
      # binary. Same WCAG-of-secret-scanning ruleset; just no action wrapper.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks detect
        # R-048 HARD: zero secrets at merge time. --redact strips secret values
        # from logs (defense-in-depth in case a finding ever surfaces).
        # --exit-code 1 makes any finding fail the CI run.
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  # Umbrella aggregator. Branch protection requires the `ci` check; keeping
  # that name here means we can split work into parallel jobs without
  # reconfiguring protected-branch rules. This job only passes when every
  # parallel job above is green.
  ci:
    needs: [static, build, size, test, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All required checks passed."

  release:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the PAT so commits + the Version Packages PR are authored by the
          # token owner, not by github-actions[bot]. PRs authored via GITHUB_TOKEN
          # do NOT trigger downstream `pull_request` workflows (CI never runs on
          # them), which makes auto-merge impossible. Authoring as a user fires
          # CI normally and the PR auto-merges when checks pass.
          token: ${{ secrets.CHANGESETS_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
        env:
          # CHANGESETS_TOKEN (PAT) instead of GITHUB_TOKEN so the Version
          # Packages PR fires `pull_request` workflows and can auto-merge.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Dispatch ds-package-published to poukai-inc/pouk.ai
        if: steps.changesets.outputs.published == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CONSUMER_DISPATCH_TOKEN }}
          repository: poukai-inc/pouk.ai
          event-type: ds-package-published
          client-payload: |
            {
              "version": "${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version }}"
            }
      - name: Dispatch ds-package-published to poukai-inc/autopost
        if: steps.changesets.outputs.published == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CONSUMER_DISPATCH_TOKEN }}
          repository: poukai-inc/autopost
          event-type: ds-package-published
          client-payload: |
            {
              "version": "${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version }}"
            }
